# DEMO secret. Replace with sealed-secrets / SOPS / external-secrets in real use.
# Apply with: kubectl apply -f k8s/10-secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: ollive-secrets
  namespace: ollive
type: Opaque
stringData:
  POSTGRES_USER: ollive
  POSTGRES_PASSWORD: change-me-in-prod
  POSTGRES_DB: ollive
  DATABASE_URL: postgresql://ollive:change-me-in-prod@postgres:5432/ollive?schema=public
  REDIS_URL: redis://redis:6379
  INGESTION_API_KEY: change-me-rotate-often
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GOOGLE_API_KEY: ""
  GROQ_API_KEY: ""
