services:
  postgres:
    image: postgres:16-alpine
    container_name: ollive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ollive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ollive}
      POSTGRES_DB: ${POSTGRES_DB:-ollive}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ollive} -d ${POSTGRES_DB:-ollive}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ollive-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    container_name: ollive-ingestion
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ollive}:${POSTGRES_PASSWORD:-ollive}@postgres:5432/${POSTGRES_DB:-ollive}?schema=public
      REDIS_URL: redis://redis:6379
      INGESTION_PORT: 4000
      INGESTION_API_KEY: ${INGESTION_API_KEY:-dev-ingest-key-change-me}
      PII_REDACTION: ${PII_REDACTION:-true}
      NODE_ENV: production
    ports:
      - "4000:4000"

  chatbot:
    build:
      context: .
      dockerfile: chatbot/Dockerfile
    container_name: ollive-chatbot
    restart: unless-stopped
    depends_on:
      - ingestion
    environment:
      INGESTION_URL: http://ingestion:4000
      NEXT_PUBLIC_INGESTION_URL: http://localhost:4000
      INGESTION_API_KEY: ${INGESTION_API_KEY:-dev-ingest-key-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-mock}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-mock-fast}
      PII_REDACTION: ${PII_REDACTION:-true}
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
